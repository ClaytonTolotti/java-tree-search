AWSTemplateFormatVersion: '2010-09-09'
Description: S3 Bucket template with CloudFormation intrinsic functions

Parameters:
  BucketName:
    Type: String
    Description: Name of the S3 bucket

Resources:
  MyBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Ref BucketName
      Tags:
        - Key: Name
          Value: !Sub "bucket-${BucketName}"

  BucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref MyBucket
      PolicyDocument:
        Statement:
          - Effect: Allow
            Action: s3:GetObject
            Resource: !Sub "arn:aws:s3:::${BucketName}/*"

Outputs:
  BucketArn:
    Value: !GetAtt MyBucket.Arn
  BucketDomainName:
    Value: !GetAtt MyBucket.DomainName
